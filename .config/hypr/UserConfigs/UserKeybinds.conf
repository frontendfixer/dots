# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Qtile-parity keybinds (source: ~/.config/qtile/keys.py + workspace.py)

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds

$mainMod = SUPER
$term = kitty
$browser = google-chrome
$browserAlt = firefox
$editor = code
$file = pcmanfm
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

# --- Essentials (Qtile var.py) ---
bind = $mainMod, Return, exec, $term
bind = $mainMod, E, exec, $file
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod SHIFT, B, exec, $browserAlt
bind = $mainMod SHIFT, C, exec, galculator
bind = $mainMod SHIFT, G, exec, flameshot gui

# --- Launchers (Qtile rofi/dmenu) ---
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window
bind = $mainMod, P, exec, pkill rofi || rofi -modi drun -show drun -config ~/.config/rofi/col_singlerow.rasi
bind = $mainMod SHIFT, Return, exec, dmenu_run -nb '#1a1e1e' -sf '#212128' -sb '#f24054' -nf '#00e5ff' -p 'Run: '
bind = CTRL SHIFT, space, exec, $scriptsDir/RofiEmoji.sh

# --- Lock / power (Qtile) ---
bind = $mainMod SHIFT, L, exec, $scriptsDir/LockScreen.sh
bind = $mainMod SHIFT, E, exec, $scriptsDir/Wlogout.sh

# --- Layout / window management (Qtile) ---
bind = $mainMod, space, cyclenext
bind = $mainMod, BackSpace, exec, $scriptsDir/ChangeLayout.sh
bind = $mainMod SHIFT, space, togglefloating
bind = $mainMod SHIFT, S, togglesplit
bind = $mainMod, Insert, exec, sh -c 'mkdir -p ~/Pictures && flameshot full -p ~/Pictures/$(date +%Y-%m-%d-%T-scr.png)'

# Floating window resize (Qtile mod+ctrl+shift+arrows ±10px)
binde = $mainMod CTRL SHIFT, left, resizeactive,-10 0
binde = $mainMod CTRL SHIFT, right, resizeactive,10 0
binde = $mainMod CTRL SHIFT, up, resizeactive,0 -10
binde = $mainMod CTRL SHIFT, down, resizeactive,0 10

# Move windows in layout (Qtile mod+shift+arrows shuffle)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Grow windows in layout (Qtile mod+ctrl+arrows)
binde = $mainMod CTRL, left, resizeactive,-10 0
binde = $mainMod CTRL, right, resizeactive,10 0
binde = $mainMod CTRL, up, resizeactive,0 -10
binde = $mainMod CTRL, down, resizeactive,0 10

# --- Hyprland extras (kept) ---
bind = $mainMod, A, exec, pkill rofi || true && ags -t 'overview'
bind = $mainMod ALT, C, exec, $UserScripts/RofiCalc.sh
bind = $mainMod CTRL, Return, exec, pypr toggle term
bind = $mainMod, Z, exec, pypr zoom
bind = $mainMod SHIFT, O, exec, $UserScripts/ZshChangeTheme.sh
bindn = ALT_L, SHIFT_L, exec, $scriptsDir/SwitchKeyboardLayout.sh
