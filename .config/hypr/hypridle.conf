# Hypridle idle daemon
# Cascade: warn (8m) -> lock (10m) -> display off (10.5m) -> suspend on battery (30m)

general {
    lock_cmd = pidof hyprlock || hyprlock -q
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    inhibit_sleep = 2
}

# Turn off display soon after a manual lock
listener {
    timeout = 30
    on-timeout = pidof hyprlock && hyprctl dispatch dpms off
    on-resume = pidof hyprlock && hyprctl dispatch dpms on
    ignore_inhibit = true
}

# Idle warning
listener {
    timeout = 480
    on-timeout = notify-send -u low -t 5000 "Idle" "You have been inactive for 8 minutes"
}

# Lock session
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Display off after continued idle
listener {
    timeout = 630
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    ignore_inhibit = true
}

# Suspend on battery after extended idle
listener {
    timeout = 1800
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC0/online 2>/dev/null || cat /sys/class/power_supply/AC/online 2>/dev/null)" = "0" ] && systemctl suspend'
    ignore_inhibit = true
}
